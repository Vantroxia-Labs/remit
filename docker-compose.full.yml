# Full Docker Compose Stack for EInvoice Integrator System
# This configuration includes all services: APIs, Background Service, PostgreSQL, Redis, pgAdmin
#
# Usage:
#   Development: docker-compose -f docker-compose.full.yml up -d
#   Production:  docker-compose -f docker-compose.full.yml -f docker-compose.prod.yml up -d
#   Shutdown:    docker-compose -f docker-compose.full.yml down
#   With volumes: docker-compose -f docker-compose.full.yml down -v

version: '3.8'

services:
  # =============================================
  # Database Services
  # =============================================

  postgresql:
    image: postgres:15-alpine
    container_name: einvoice-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-einvoiceintegrator_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-einvoiceintegrator_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - einvoice-network
    labels:
      - "com.einvoiceintegrator.service=database"
      - "com.einvoiceintegrator.description=PostgreSQL Database"

  redis:
    image: redis:7-alpine
    container_name: einvoice-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - einvoice-network
    labels:
      - "com.einvoiceintegrator.service=cache"
      - "com.einvoiceintegrator.description=Redis Cache"

  # =============================================
  # Application Services
  # =============================================

  einvoice-api:
    build:
      context: .
      dockerfile: src/Presentation/EInvoiceIntegrator.API/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: einvoice-integrator-api:latest
    container_name: einvoice-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:8080"
      - "${API_HTTPS_PORT:-5001}:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_HTTPS_PORT=8081
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_USE_POLLING_FILE_WATCHER=true

      # Database Configuration
      - ConnectionStrings__DefaultConnection=Host=postgresql;Port=5432;Database=${DB_NAME:-einvoiceintegrator_dev};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres};Pooling=true;SSL Mode=Prefer;Trust Server Certificate=true

      # Redis Configuration
      - Redis__Configuration=redis:6379,password=${REDIS_PASSWORD:-redis123}
      - Redis__InstanceName=${REDIS_INSTANCE_NAME:-EInvoice_}

      # JWT Settings
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER:-EInvoiceIntegrator}
      - JwtSettings__Audience=${JWT_AUDIENCE:-EInvoiceIntegratorUsers}
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-60}

      # FIRS Configuration
      - FIRSAccessPoint__BaseUrl=${FIRS_BASE_URL}
      - FIRSAccessPoint__Username=${FIRS_USERNAME}
      - FIRSAccessPoint__Password=${FIRS_PASSWORD}
      - FIRSAccessPoint__ApiKey=${FIRS_API_KEY}

      # Interswitch Configuration
      - Interswitch__BaseUrl=${INTERSWITCH_BASE_URL}
      - Interswitch__ClientId=${INTERSWITCH_CLIENT_ID}
      - Interswitch__ClientSecret=${INTERSWITCH_CLIENT_SECRET}
      - Interswitch__TokenUrl=${INTERSWITCH_TOKEN_URL}

      # Email Configuration
      - MailKit__SmtpServer=${SMTP_SERVER}
      - MailKit__SmtpPort=${SMTP_PORT:-587}
      - MailKit__Username=${SMTP_USERNAME}
      - MailKit__Password=${SMTP_PASSWORD}
      - MailKit__UseSsl=${SMTP_USE_SSL:-true}
      - MailKit__SenderEmail=${SMTP_SENDER_EMAIL}
      - MailKit__SenderName=${SMTP_SENDER_NAME:-EInvoice Integrator}

      # Security
      - Security__EncryptionKey=${ENCRYPTION_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Logging
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - Logging__LogLevel__EInvoiceIntegrator=Information

    volumes:
      - ./logs/api:/app/logs:rw
      - ./data/api:/app/data:rw
      - api-temp:/tmp
    networks:
      - einvoice-network
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.einvoiceintegrator.service=api"
      - "com.einvoiceintegrator.version=1.0"
      - "com.einvoiceintegrator.description=EInvoice Integrator Main API"

  einvoice-saas-api:
    build:
      context: .
      dockerfile: src/Presentation/EInvoiceIntegratorSaas.API/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: einvoice-integrator-saas-api:latest
    container_name: einvoice-saas-api
    restart: unless-stopped
    ports:
      - "${SAAS_API_PORT:-5002}:8080"
      - "${SAAS_API_HTTPS_PORT:-5003}:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_HTTPS_PORT=8081
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_USE_POLLING_FILE_WATCHER=true

      # Database Configuration
      - ConnectionStrings__DefaultConnection=Host=postgresql;Port=5432;Database=${DB_NAME:-einvoiceintegrator_dev};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres};Pooling=true;SSL Mode=Prefer;Trust Server Certificate=true

      # Redis Configuration
      - Redis__Configuration=redis:6379,password=${REDIS_PASSWORD:-redis123}
      - Redis__InstanceName=${REDIS_INSTANCE_NAME:-EInvoice_SaaS_}

      # JWT Settings
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER:-EInvoiceIntegrator}
      - JwtSettings__Audience=${JWT_AUDIENCE:-EInvoiceIntegratorUsers}
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-60}

      # FIRS Configuration
      - FIRSAccessPoint__BaseUrl=${FIRS_BASE_URL}
      - FIRSAccessPoint__Username=${FIRS_USERNAME}
      - FIRSAccessPoint__Password=${FIRS_PASSWORD}
      - FIRSAccessPoint__ApiKey=${FIRS_API_KEY}

      # Interswitch Configuration
      - Interswitch__BaseUrl=${INTERSWITCH_BASE_URL}
      - Interswitch__ClientId=${INTERSWITCH_CLIENT_ID}
      - Interswitch__ClientSecret=${INTERSWITCH_CLIENT_SECRET}
      - Interswitch__TokenUrl=${INTERSWITCH_TOKEN_URL}

      # Email Configuration
      - MailKit__SmtpServer=${SMTP_SERVER}
      - MailKit__SmtpPort=${SMTP_PORT:-587}
      - MailKit__Username=${SMTP_USERNAME}
      - MailKit__Password=${SMTP_PASSWORD}
      - MailKit__UseSsl=${SMTP_USE_SSL:-true}
      - MailKit__SenderEmail=${SMTP_SENDER_EMAIL}
      - MailKit__SenderName=${SMTP_SENDER_NAME:-EInvoice Integrator SaaS}

      # Security
      - Security__EncryptionKey=${ENCRYPTION_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Logging
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - Logging__LogLevel__EInvoiceIntegrator=Information

    volumes:
      - ./logs/saas-api:/app/logs:rw
      - ./data/saas-api:/app/data:rw
      - saas-api-temp:/tmp
    networks:
      - einvoice-network
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.einvoiceintegrator.service=saas-api"
      - "com.einvoiceintegrator.version=1.0"
      - "com.einvoiceintegrator.description=EInvoice Integrator SaaS API"

  einvoice-background-service:
    build:
      context: .
      dockerfile: src/Presentation/EInvoiceIntegrator.BackgroundService/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: einvoice-integrator-bg-service:latest
    container_name: einvoice-background-service
    restart: unless-stopped
    ports:
      - "${BG_SERVICE_PORT:-8081}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_USE_POLLING_FILE_WATCHER=true

      # Database Configuration
      - ConnectionStrings__DefaultConnection=Host=postgresql;Port=5432;Database=${DB_NAME:-einvoiceintegrator_dev};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres};Pooling=true;SSL Mode=Prefer;Trust Server Certificate=true

      # Email Configuration
      - MailKit__SmtpServer=${SMTP_SERVER}
      - MailKit__SmtpPort=${SMTP_PORT:-587}
      - MailKit__Username=${SMTP_USERNAME}
      - MailKit__Password=${SMTP_PASSWORD}
      - MailKit__UseSsl=${SMTP_USE_SSL:-true}

      # SFTP Configuration
      - SFTPDetails__Connections__0__Host=${SFTP_HOST}
      - SFTPDetails__Connections__0__UserName=${SFTP_USERNAME}
      - SFTPDetails__Connections__0__Password=${SFTP_PASSWORD}
      - SFTPDetails__Connections__0__Port=${SFTP_PORT:-22}

      # Processing Configuration
      - Processing__ProcessingIntervalSeconds=${PROCESSING_INTERVAL:-30}
      - Processing__MaxFilesPerBatch=${MAX_FILES_PER_BATCH:-50}
      - Processing__EnableParallelProcessing=${ENABLE_PARALLEL_PROCESSING:-true}

      # Security
      - Security__EncryptionKey=${ENCRYPTION_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Logging
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
      - Logging__LogLevel__EInvoiceIntegrator.BackgroundService.Jobs=Information
      - Logging__LogLevel__Quartz=Information

    volumes:
      - ./logs/background:/app/logs:rw
      - ./data/background:/app/data:rw
      - bg-temp:/tmp
    networks:
      - einvoice-network
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.einvoiceintegrator.service=background-service"
      - "com.einvoiceintegrator.version=1.0"
      - "com.einvoiceintegrator.description=EInvoice Integrator Background Service with Quartz Scheduler"

  # =============================================
  # Management & Monitoring Services
  # =============================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: einvoice-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@einvoice.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    restart: unless-stopped
    networks:
      - einvoice-network
    labels:
      - "com.einvoiceintegrator.service=pgadmin"
      - "com.einvoiceintegrator.description=PostgreSQL Management UI"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: einvoice-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - einvoice-network
    labels:
      - "com.einvoiceintegrator.service=redis-commander"
      - "com.einvoiceintegrator.description=Redis Management UI"

  # =============================================
  # Reverse Proxy (Optional)
  # =============================================

  nginx:
    image: nginx:alpine
    container_name: einvoice-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - einvoice-api
      - einvoice-saas-api
      - einvoice-background-service
    restart: unless-stopped
    networks:
      - einvoice-network
    labels:
      - "com.einvoiceintegrator.service=reverse-proxy"
      - "com.einvoiceintegrator.description=Nginx Reverse Proxy"
    profiles:
      - with-proxy

# =============================================
# Volumes
# =============================================

volumes:
  postgres_data:
    driver: local
    labels:
      - "com.einvoiceintegrator.volume=postgres-data"

  redis_data:
    driver: local
    labels:
      - "com.einvoiceintegrator.volume=redis-data"

  pgadmin_data:
    driver: local
    labels:
      - "com.einvoiceintegrator.volume=pgadmin-data"

  api-temp:
    driver: local

  saas-api-temp:
    driver: local

  bg-temp:
    driver: local

# =============================================
# Networks
# =============================================

networks:
  einvoice-network:
    driver: bridge
    labels:
      - "com.einvoiceintegrator.network=main"
