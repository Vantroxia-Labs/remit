# Simplified Docker Compose for PostgreSQL
# Use this if you want just PostgreSQL without pgAdmin

services:
  postgresql:
    image: postgres:15-alpine
    container_name: einvoice-postgres-simple
    environment:
      POSTGRES_DB: einvoiceintegrator_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_simple_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_simple_data:
    driver: local